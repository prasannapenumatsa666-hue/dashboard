<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Environment Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f4f6f9;
    }

    header {
      background-color: #003366;
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: 600;
    }

    .container {
      padding: 30px;
    }

    /* PROJECT TILES */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .tile {
      background: white;
      padding: 30px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      font-size: 18px;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }

    .tile:hover {
      background: #0078d4;
      color: white;
      transform: scale(1.05);
    }

    /* TABLE VIEW */
    .card {
      background: white;
      padding: 20px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background-color: #0078d4;
      color: white;
      padding: 10px;
      text-align: center;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background-color: #f2f8ff;
    }

    .back-btn {
      margin-bottom: 15px;
      background-color: #555;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .back-btn:hover {
      background-color: #333;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  Project Environment Dashboard
</header>

<div class="container">

  <!-- PROJECT TILE VIEW -->
  <div id="projectView" class="tiles"></div>

  <!-- ENVIRONMENT TABLE VIEW -->
  <div id="envView" class="card" style="display:none;">
    <button class="back-btn" onclick="showProjects()">⬅ Back to Projects</button>
    <h3 id="projectTitle"></h3>

    <table>
      <thead>
        <tr>
          <th>Environment</th>
          <th>Package ID</th>
          <th>Ticket ID</th>
        </tr>
      </thead>
      <tbody id="envTableBody"></tbody>
    </table>
  </div>

  <footer>
    © 2026 Project Environment Dashboard | Demo Version
  </footer>

</div>

<script>
  const data = {
    "SOIC": [
      { env: "DEV01", packageId: "2026.02.23.01-Dev01", ticketId: "13501" },
      { env: "DEV02", packageId: "2026.02.23.02-Dev02", ticketId: "13502" },
      { env: "DEV03", packageId: "2026.02.23.03-Dev03", ticketId: "13503" },
      { env: "DEV04", packageId: "2026.02.23.04-Dev04", ticketId: "13504" },
      { env: "UAT",   packageId: "2026.02.23.05-UAT",   ticketId: "13505" },
      { env: "PERF",  packageId: "2026.02.23.06-Perf",  ticketId: "13506" },
      { env: "DEBUG", packageId: "2026.02.23.07-Debug", ticketId: "13507" },
      { env: "PROD",  packageId: "2026.02.23.08-Prod",  ticketId: "13508" }
    ],
    "SFP": [
      { env: "DEV",  packageId: "2026.02.24.01-Dev",  ticketId: "14501" },
      { env: "UAT",  packageId: "2026.02.24.02-UAT",  ticketId: "14502" },
      { env: "PROD", packageId: "2026.02.24.03-Prod", ticketId: "14503" }
    ],
    "CFP": [
      { env: "DEV",  packageId: "2026.02.25.01-Dev",  ticketId: "15501" },
      { env: "UAT",  packageId: "2026.02.25.02-UAT",  ticketId: "15502" },
      { env: "PROD", packageId: "2026.02.25.03-Prod", ticketId: "15503" }
    ]
  };

  function loadProjects() {
    const projectView = document.getElementById("projectView");
    projectView.innerHTML = "";

    Object.keys(data).forEach(project => {
      const div = document.createElement("div");
      div.className = "tile";
      div.innerText = project;
      div.onclick = () => showEnvironments(project);
      projectView.appendChild(div);
    });
  }

  function showEnvironments(project) {
    document.getElementById("projectView").style.display = "none";
    document.getElementById("envView").style.display = "block";
    document.getElementById("projectTitle").innerText = "Project : " + project;

    const tableBody = document.getElementById("envTableBody");
    tableBody.innerHTML = "";

    data[project].forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.env}</td>
        <td>${row.packageId}</td>
        <td>${row.ticketId}</td>
      `;
      tableBody.appendChild(tr);
    });
  }

  function showProjects() {
    document.getElementById("envView").style.display = "none";
    document.getElementById("projectView").style.display = "grid";
  }

  loadProjects();
</script>

</body>
</html>
