<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Environment Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f4f6f9;
    }

    header {
      background-color: #003366;
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: 600;
    }

    .container {
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filters input,
    .filters select {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 200px;
    }

    .filters button {
      background-color: #0078d4;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .filters button:hover {
      background-color: #005fa3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th {
      background-color: #0078d4;
      color: white;
      padding: 10px;
      text-align: center;
      font-weight: 600;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background-color: #f2f8ff;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  Project Environment Dashboard
</header>

<div class="container">
  <div class="card">

    <div class="filters">
      <input type="text" id="projectInput" placeholder="Enter Project Name (SOIC, SFP, CFP)">
      
      <select id="envSelect">
        <option value="">All Environments</option>
        <option value="DEV">DEV</option>
        <option value="UAT">UAT</option>
        <option value="PERF">PERF</option>
        <option value="PROD">PROD</option>
      </select>

      <button onclick="filterData()">Search</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Project Name</th>
          <th>Environment</th>
          <th>Package ID</th>
          <th>Ticket ID</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </div>

  <footer>
    © 2026 Project Environment Dashboard | Demo Version
  </footer>
</div>

<script>
  const data = [
    { project: "SOIC", environment: "DEV",  packageId: "2026.02.23.01-Dev",  ticketId: "14458" },
    { project: "SFP",  environment: "UAT",  packageId: "2026.02.23.02-UAT",  ticketId: "23456" },
    { project: "CFP",  environment: "PROD", packageId: "2026.02.23.03-Prod", ticketId: "34567" },
    { project: "Capricorn", environment: "PERF", packageId: "2026.02.23.04-Perf", ticketId: "45678" },
    { project: "MAS", environment: "DEV",  packageId: "2026.02.23.05-Dev", ticketId: "56789" },
    { project: "Suncorp", environment: "UAT", packageId: "2026.02.23.06-UAT", ticketId: "67890" }
  ];

  function loadTable(rows) {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    rows.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.project}</td>
        <td>${row.environment}</td>
        <td>${row.packageId}</td>
        <td>${row.ticketId}</td>
      `;
      table.appendChild(tr);
    });
  }

  function filterData() {
    const project = document.getElementById("projectInput").value.toLowerCase();
    const env = document.getElementById("envSelect").value;

    let filtered = data;

    if (project) {
      filtered = filtered.filter(d => d.project.toLowerCase().includes(project));
    }

    if (env) {
      filtered = filtered.filter(d => d.environment === env);
    }

    loadTable(filtered);
  }

  loadTable(data);
</script>

</body>
</html>
